<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《皮毛之下》</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .cards {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2rem 2.5rem;
            min-width: 180px;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: #58a6ff;
            box-shadow: 0 8px 24px rgba(88, 166, 255, 0.15);
        }
        .card .icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .card .title { font-size: 1.2rem; font-weight: 600; }
        .card .desc { color: #8b949e; font-size: 0.85rem; margin-top: 0.3rem; }
        .card.writing:hover { border-color: #bc8cff; box-shadow: 0 8px 24px rgba(188, 140, 255, 0.15); }
        .footer {
            margin-top: 2.5rem;
            color: #484f58;
            font-size: 0.8rem;
        }
        .footer a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>《皮毛之下》</h1>
        <p class="subtitle">散掉的冰块 · 福瑞控变形记</p>
        <div class="cards">
            <a class="card" href="release/catalogue.md">
                <div class="icon">✈️</div>
                <div class="title">发布版</div>
                <div class="desc">Release</div>
            </a>
            <a class="card writing" href="writing/catalogue.md">
                <div class="icon">✍️</div>
                <div class="title">写作版</div>
                <div class="desc">Writing</div>
            </a>
        </div>
        <div class="footer">
            <a href="https://github.com/cnbilinyj/BeneathTheFurries">GitHub</a>
        </div>
    </div>
</body>
</html>
